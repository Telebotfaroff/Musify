name: Android Release

concurrency:
  group: release-build
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release/**"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for required_var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!required_var}" ]; then
              missing+=("$required_var")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required signing secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare keystore and signing environment
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          {
            echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Resolve release metadata from app version
        id: release_meta
        run: |
          set -euo pipefail

          version_name="$(python - <<'PY'
import pathlib
import re
import sys

content = pathlib.Path('app/build.gradle.kts').read_text(encoding='utf-8')
match = re.search(r'^\s*versionName\s*=\s*"([^"]+)"', content, re.MULTILINE)
if not match:
    print('Unable to locate versionName in app/build.gradle.kts', file=sys.stderr)
    sys.exit(1)
print(match.group(1))
PY
          )"

          release_tag="v${version_name}"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved app versionName=${version_name}; release tag will be ${release_tag}."

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build signed release APK and AAB
        run: ./gradlew :app:assembleUniversalRelease :app:bundleUniversalRelease --build-cache --configuration-cache --parallel

      - name: Prepare stable release assets
        id: release_assets
        run: |
          set -euo pipefail

          apk_dir="app/build/outputs/apk/universal/release"
          aab_dir="app/build/outputs/bundle/universalRelease"

          mapfile -t apk_candidates < <(find "$apk_dir" -maxdepth 1 -type f -name "*.apk" | sort)
          if [ "${#apk_candidates[@]}" -eq 0 ]; then
            echo "::error::No APK files found in $apk_dir"
            exit 1
          fi

          apk_source="${apk_candidates[0]}"
          mkdir -p release-assets
          cp "$apk_source" release-assets/app-release.apk
          cp "$apk_source" release-assets/app-universal-release.apk

          release_files=(
            "release-assets/app-release.apk"
            "release-assets/app-universal-release.apk"
          )

          mapfile -t aab_candidates < <(find "$aab_dir" -maxdepth 1 -type f -name "*.aab" | sort)
          if [ "${#aab_candidates[@]}" -gt 0 ]; then
            cp "${aab_candidates[0]}" release-assets/app-universal-release.aab
            release_files+=("release-assets/app-universal-release.aab")
            echo "Resolved AAB source: ${aab_candidates[0]}"
          else
            echo "::notice::No AAB found in $aab_dir. Only APK assets will be uploaded to the release."
          fi

          echo "Resolved APK source: $apk_source"

          {
            echo "release_files<<EOF"
            printf '%s\n' "${release_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-apk-${{ github.ref_name }}-run${{ github.run_number }}
          path: app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-aab-${{ github.ref_name }}-run${{ github.run_number }}
          path: app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Create or reuse release tag
        id: ensure_release_tag
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            tag_sha="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}' | head -n 1)"
            echo "tag_action=reused" >> "$GITHUB_OUTPUT"
            echo "Tag ${RELEASE_TAG} already exists on origin at ${tag_sha}; reusing existing tag."
          else
            echo "Tag ${RELEASE_TAG} does not exist on origin; creating it at commit ${GITHUB_SHA}."
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
            echo "tag_action=created" >> "$GITHUB_OUTPUT"
            echo "Created and pushed tag ${RELEASE_TAG}."
          fi

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.release_assets.outputs.release_files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release summary
        run: |
          echo "Release tag: ${{ steps.release_meta.outputs.release_tag }}"
          echo "Version name: ${{ steps.release_meta.outputs.version_name }}"
          echo "Tag action: ${{ steps.ensure_release_tag.outputs.tag_action }}"
