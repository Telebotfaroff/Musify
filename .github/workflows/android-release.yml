name: Android Release

concurrency:
  group: release-build
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - "release/**"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for required_var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!required_var}" ]; then
              missing+=("$required_var")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required signing secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Prepare keystore and signing environment
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          {
            echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build signed release APK and AAB
        run: ./gradlew :app:assembleUniversalRelease :app:bundleUniversalRelease --build-cache --configuration-cache --parallel

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: release-apk-${{ github.ref_name }}-run${{ github.run_number }}
          path: app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release AAB
        uses: actions/upload-artifact@v6
        with:
          name: release-aab-${{ github.ref_name }}-run${{ github.run_number }}
          path: app/build/outputs/bundle/universalRelease/*.aab
          if-no-files-found: error
          retention-days: 14
